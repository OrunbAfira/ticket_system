spring.application.name=Ingressos1

# MongoDB
# NÃO comite credenciais no repositório.
# Configure a variável de ambiente MONGODB_URI (Atlas ou local).
# Exemplo Atlas: mongodb+srv://USER:SENHA@cluster.../ingressos_db?retryWrites=true&w=majority
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ingressos_db}

server.port=8080

# Configurações de Erro e Log
server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.include-exception=false
logging.level.root=INFO
logging.level.com.mycompany.ingressos1=DEBUG
logging.level.org.mongodb.driver=WARN

# Validação
spring.mvc.throw-exception-if-no-handler-found=false
spring.web.resources.add-mappings=true
