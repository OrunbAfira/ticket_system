<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema de Ingressos</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <div class="nav-container">
            <a href="/" class="logo">Ingressos Pro</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/login">Login</a>
            </div>
        </div>
    </nav>

    <!-- MAIN -->
    <main>
        <div class="container" style="max-width: 500px;">
            <h1>Criar Conta</h1>

            <div class="card">
                <form action="/cadastro-usuario" method="post">

                    <div class="form-group">
                        <label for="nome">Nome Completo:</label>
                        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                    </div>

                    <div class="form-group">
                        <label for="login">Usuário:</label>
                        <input type="text" id="login" name="login" placeholder="Digite um nome de usuário" required>
                    </div>

                    <div class="form-group">
                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" name="senha" placeholder="Digite uma senha segura" required>
                    </div>

                    <div th:if="${erro}" class="erro" th:text="${erro}"></div>
                    <div th:if="${sucesso}" class="sucesso" th:text="${sucesso}"></div>

                    <button class="btn" type="submit" style="width: 100%;">Criar Conta</button>
                </form>
            </div>

            <div class="divider"></div>

            <div class="text-center">
                <p>Já possui conta? <a href="/login">Fazer login</a></p>
            </div>

        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2024 Sistema de Ingressos para Eventos</p>
    </footer>

</body>
</html>
